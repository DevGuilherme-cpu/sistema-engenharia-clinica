{% extends 'base.html' %}

{% block content %}
<div class="conteudo-centralizado">

    <h1 style="text-align: center;">Registrar Preventiva</h1>
    <p style="text-align: center; color: #666;">O status do equipamento será atualizado automaticamente.</p>

    <div class="form-container" style="margin-top: 30px;">
        <form action="{{ url_for('cadastrar_preventiva') }}" method="POST">

            <div style="display: flex; flex-direction: column; gap: 15px;">

                <div class="form-group">
                    <label>Selecione o Equipamento</label>
                    <select name="monitor_id" required>
                        <option value="">-- Escolha um Monitor --</option>
                        {% for monitor in monitores %}
                        <option value="{{ monitor.id }}">
                            Patrimônio: {{ monitor.patrimonio or 'N/A' }} | S/N: {{ monitor.numero_serie }} - {{ monitor.descricao }} - {{ monitor.marca or 'Sem Marca' }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Data da Realização</label>
                        <input type="date" name="data_preventiva" required>
                    </div>

                    <div class="form-group">
                        <label>Mês de Referência</label>
                        <select name="mes" required>
                            <option value="Janeiro">Janeiro</option>
                            <option value="Fevereiro">Fevereiro</option>
                            <option value="Março">Março</option>
                            <option value="Abril">Abril</option>
                            <option value="Maio">Maio</option>
                            <option value="Junho">Junho</option>
                            <option value="Julho">Julho</option>
                            <option value="Agosto">Agosto</option>
                            <option value="Setembro">Setembro</option>
                            <option value="Outubro">Outubro</option>
                            <option value="Novembro">Novembro</option>
                            <option value="Dezembro">Dezembro</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Responsável Técnico</label>
                    <input type="text" name="responsavel" placeholder="Ex: Eng. Guilherme" required>
                </div>

            </div>

            <div style="margin-top: 30px; text-align: center;">
                <button type="submit" class="btn-salvar">Salvar Preventiva</button>
                <a href="/" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
