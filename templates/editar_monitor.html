{% extends 'base.html' %}

{% block content %}
<div class="conteudo-centralizado">
        
    <h1 style="text-align: center;">Editar Equipamento</h1>
        
        <div class="form-container">
            <form action="{{ url_for('editar_monitor', id=monitor.id) }}" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" name="descricao" value="{{ monitor.descricao }}" required>
                    </div>
                    <div class="form-group">
                        <label>Número de Série</label>
                        <input type="text" name="numero_serie" value="{{ monitor.numero_serie }}" required>
                    </div>
                    <div class="form-group">
                        <label>Status Atual</label>
                        <select name="status">
                            <option value="Completa" {% if monitor.status == 'Completa' %}selected{% endif %}>Completa</option>
                            <option value="Pendente" {% if monitor.status == 'Pendente' %}selected{% endif %}>Pendente</option>
                            <option value="Manutenção" {% if monitor.status == 'Manutenção' %}selected{% endif %}>Manutenção</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top: 30px; text-align: center;">
                    <button type="submit" class="btn-salvar">Salvar Alterações</button>
                    <a href="/monitores" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
