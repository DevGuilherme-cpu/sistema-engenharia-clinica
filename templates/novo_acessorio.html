{% extends 'base.html' %}

{% block content %}
<div class="conteudo-centralizado">

    <h1 style="text-align: center;">Registrar Troca de Acessório</h1>
    <p style="text-align: center; color: #666;">Mantenha o histórico de cabos e sensores atualizado.</p>

    <div class="form-container" style="margin-top: 30px;">
        <form action="{{ url_for('novo_acessorio') }}" method="POST">

            <div style="display: flex; flex-direction: column; gap: 15px;">

                <div class="form-group">
                    <label>Equipamento Destino</label>
                    <select name="monitor_id" required>
                        <option value="">-- Escolha o Monitor --</option>
                        {% for monitor in monitores %}
                        <option value="{{ monitor.id }}">
                            Patrimônio: {{ monitor.patrimonio or 'N/A' }} | Setor: {{ monitor.local or 'N/A' }} - {{
                            monitor.descricao }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Tipo de Acessório</label>
                        <select name="tipo" required>
                            <option value="">-- Selecione --</option>
                            <option value="Cabo de ECG">Cabo de ECG</option>
                            <option value="Sensor de SpO2 (Oxímetro)">Sensor de SpO2 (Oxímetro)</option>
                            <option value="Braçadeira PNI">Braçadeira PNI</option>
                            <option value="Manguito/Mangueira PNI">Manguito/Mangueira PNI</option>
                            <option value="Sensor de Temperatura">Sensor de Temperatura</option>
                            <option value="Cabo de Capnografia">Cabo de Capnografia</option>
                            <option value="Cabo de Pressão Invasiva">Cabo de Pressão Invasiva</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Data da Troca / Entrega</label>
                        <input type="date" name="data_troca" required>
                    </div>
                </div>

            </div>

            <div style="margin-top: 30px; text-align: center;">
                <button type="submit" class="btn-salvar" style="background-color: #17a2b8;">Registrar Troca</button>
                <a href="/acessorios" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
